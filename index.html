<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PIZZA BATTLE: ULTIMATE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            font-family: 'Arial', sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 750px;
            overflow: hidden;
            border: 4px solid #FF6347;
            border-radius: 10px;
            box-shadow: 0 0 60px rgba(255, 69, 0, 0.8);
        }
        canvas { display: block; width: 100%; height: 100%; }
        #ui {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 10;
            flex-wrap: wrap; gap: 4px;
        }
        .ui-text {
            background: rgba(0,0,0,0.75); color: #FFD700; padding: 4px 10px;
            border-radius: 12px; font-size: 12px; font-weight: bold;
        }
        .ui-text.p2 { color: #00BFFF; }
        #shopScreen, #gameOverScreen, #startScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.85); z-index: 20; pointer-events: auto;
        }
        .shop-content, .screen-content {
            text-align: center; padding: 20px; background: rgba(20,5,0,0.95);
            border-radius: 20px; border: 3px solid #FF6347;
            box-shadow: 0 0 40px rgba(255,69,0,0.6); max-width: 320px; width: 90%;
        }
        h1 { color: #FF6347; font-size: 24px; margin-bottom: 8px; text-shadow: 0 0 15px #FF4500; }
        .emoji-icon { font-size: 50px; margin: 6px 0; }
        p { color: #FFD700; margin: 4px 0; font-size: 13px; }
        .btn {
            display: inline-block; padding: 12px 28px; margin: 6px;
            background: linear-gradient(135deg, #FF6347, #FF4500); color: white;
            border: none; border-radius: 25px; font-size: 16px; font-weight: bold;
            cursor: pointer; letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(255,69,0,0.5); transition: all 0.2s;
            pointer-events: auto;
        }
        .btn:active { transform: scale(0.93); }
        .btn.small { padding: 8px 18px; font-size: 13px; background: #555; }
        .btn.buy { background: linear-gradient(135deg, #FFD700, #FFA500); color: #000; }
        .shop-row { display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.5); padding: 8px; margin: 6px 0; border-radius: 10px; }
        .shop-row span { color: #FFF; font-size: 13px; }
        .final-score { font-size: 44px; color: #FFD700; font-weight: bold; text-shadow: 0 0 20px gold; }
        #gameOverScreen, #shopScreen { display: none; }
        #startScreen { display: flex; }
        #p2ScoreLabel { color: #00BFFF; }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <span class="ui-text" id="scoreLabel">🍕 P1: 0</span>
        <span class="ui-text p2" id="p2ScoreLabel" style="display:none;">👤 P2: 0</span>
        <span class="ui-text" id="coinLabel">🪙 0</span>
        <span class="ui-text" id="levelLabel">🌍 Ур. 1</span>
        <span class="ui-text" id="comboLabel" style="display:none;">🔥 x1</span>
        <span class="ui-text" id="frenzyLabel" style="display:none;color:#FF00FF;">⚡FRENZY⚡</span>
    </div>

    <!-- Стартовый экран -->
    <div id="startScreen">
        <div class="screen-content">
            <div class="emoji-icon">🍕💀</div>
            <h1>PIZZA BATTLE</h1>
            <p>ULTIMATE EDITION</p>
            <button class="btn" id="btn1Player">🎮 1 ИГРОК</button>
            <button class="btn" id="btn2Player">👥 2 ИГРОКА (на одном экране)</button>
            <button class="btn small" id="btnShop">🛒 МАГАЗИН</button>
        </div>
    </div>

    <!-- Магазин -->
    <div id="shopScreen">
        <div class="shop-content">
            <h1>🛒 МАГАЗИН</h1>
            <p>Монеты: <span id="shopCoinDisplay">🪙 0</span></p>
            <div class="shop-row"><span>🛡️ Щит (1 игра)</span><span>50🪙</span><button class="btn buy" id="buyShield">Купить</button></div>
            <div class="shop-row"><span>⚡ Буст скорости</span><span>30🪙</span><button class="btn buy" id="buyBoost">Купить</button></div>
            <div class="shop-row"><span>🎨 Скин "Неон"</span><span>100🪙</span><button class="btn buy" id="buySkin">Купить</button></div>
            <button class="btn small" id="btnCloseShop">🔙 НАЗАД</button>
        </div>
    </div>

    <!-- Конец игры -->
    <div id="gameOverScreen">
        <div class="screen-content">
            <div class="emoji-icon">💀🍕</div>
            <h1 id="winText">ПИЦЦА ДОГНАЛА!</h1>
            <p class="final-score" id="finalScore">0</p>
            <p id="coinsEarned" style="color:#FFD700;">+🪙 0</p>
            <button class="btn" id="btnRestart">🔄 РЕВАНШ!</button>
            <button class="btn small" id="btnToMenu">🏠 В МЕНЮ</button>
        </div>
    </div>
</div>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('gameContainer');

    // UI
    const scoreLabel = document.getElementById('scoreLabel');
    const p2ScoreLabel = document.getElementById('p2ScoreLabel');
    const coinLabel = document.getElementById('coinLabel');
    const levelLabel = document.getElementById('levelLabel');
    const comboLabel = document.getElementById('comboLabel');
    const frenzyLabel = document.getElementById('frenzyLabel');
    const startScreen = document.getElementById('startScreen');
    const shopScreen = document.getElementById('shopScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreEl = document.getElementById('finalScore');
    const coinsEarnedEl = document.getElementById('coinsEarned');
    const winText = document.getElementById('winText');
    const shopCoinDisplay = document.getElementById('shopCoinDisplay');

    let W, H, groundY;
    function resize() {
        W = container.clientWidth;
        H = container.clientHeight;
        canvas.width = W;
        canvas.height = H;
        groundY = H * 0.84;
    }
    resize();
    window.addEventListener('resize', resize);

    // Состояние
    let gameMode = 1; // 1 или 2 игрока
    let player1 = { x: 0, y: 0, width: 45, height: 50, vy: 0, jumping: false, dead: false, color: '#FF6347', shield: false, side: 'left' };
    let player2 = { x: 0, y: 0, width: 45, height: 50, vy: 0, jumping: false, dead: false, color: '#00BFFF', shield: false, side: 'right' };
    let pizza = { x: 0, y: 0, width: 110, height: 110, rotation: 0 };
    let obstacles = [], coins = [], particles = [];
    let scoreP1 = 0, scoreP2 = 0, totalCoins = 0, earnedCoins = 0;
    let gameSpeed = 4, baseGameSpeed = 4;
    let gameRunning = false, gameOver = false;
    let gravity = 0.7, jumpForce = -13;
    let frameCount = 0, pizzaDistance = 360;
    let comboCount = 0, comboTimer = 0;
    let frenzyMode = false, frenzyTimer = 0;
    let level = 1, screenShake = 0;

    // Магазин
    let shopCoins = parseInt(localStorage.getItem('pizzaShopCoins') || '0');
    let hasShield = false, hasBoost = false, skinUnlocked = false;
    let currentSkin = localStorage.getItem('pizzaSkin') || 'default';

    function updateShopDisplay() {
        shopCoinDisplay.textContent = '🪙 ' + shopCoins;
        document.getElementById('buyShield').textContent = hasShield ? '✅' : '50🪙';
        document.getElementById('buyBoost').textContent = hasBoost ? '✅' : '30🪙';
        document.getElementById('buySkin').textContent = skinUnlocked ? '✅' : '100🪙';
    }

    function initPlayers() {
        player1.x = W * 0.18;
        player1.y = groundY - player1.height;
        player1.vy = 0; player1.jumping = false; player1.dead = false;
        player1.shield = hasShield;
        player1.color = currentSkin === 'neon' ? '#FF00FF' : '#FF6347';

        if (gameMode === 2) {
            player2.x = W * 0.6;
            player2.y = groundY - player2.height;
            player2.vy = 0; player2.jumping = false; player2.dead = false;
            player2.shield = hasShield;
            player2.color = currentSkin === 'neon' ? '#00FFFF' : '#00BFFF';
            p2ScoreLabel.style.display = 'inline';
        } else {
            p2ScoreLabel.style.display = 'none';
        }
    }

    function init() {
        initPlayers();
        pizza.x = player1.x - pizzaDistance;
        pizza.y = groundY - pizza.height + 15;
        pizza.rotation = 0;
        obstacles = []; coins = []; particles = [];
        scoreP1 = 0; scoreP2 = 0; earnedCoins = 0;
        gameSpeed = hasBoost ? 7 : 4;
        baseGameSpeed = gameSpeed;
        frameCount = 0; comboCount = 0; comboTimer = 0;
        frenzyMode = false; frenzyTimer = 0;
        level = 1; screenShake = 0;
        scoreLabel.textContent = '🍕 P1: 0';
        p2ScoreLabel.textContent = '👤 P2: 0';
        coinLabel.textContent = '🪙 0';
        levelLabel.textContent = '🌍 Ур. 1';
        comboLabel.style.display = 'none';
        frenzyLabel.style.display = 'none';
    }

    function spawnObstacle() {
        let r = Math.random();
        let obs;
        if (r < 0.4) {
            obs = { x: W + 50, y: groundY - 45, width: 44, height: 44, type: 'box' };
        } else if (r < 0.7) {
            obs = { x: W + 50, y: groundY - 25, width: 60, height: 25, type: 'sauce' };
        } else if (r < 0.9) {
            obs = { x: W + 50, y: groundY - 80, width: 55, height: 20, type: 'flying' };
        } else {
            // Враг-босс (редкий)
            obs = { x: W + 80, y: groundY - 90, width: 80, height: 80, type: 'boss', hp: 3 };
        }
        obstacles.push(obs);
    }

    function spawnCoin() {
        coins.push({
            x: W + 30, y: groundY - 40 - Math.random() * 140,
            width: 26, height: 26, collected: false, bobOff: Math.random() * Math.PI * 2
        });
    }

    function spawnParticles(x, y, color, count = 12) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x, y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6 - 3,
                life: 1, decay: 0.02 + Math.random() * 0.04, size: 3 + Math.random() * 5, color
            });
        }
    }

    function checkCollision(a, b) {
        return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
    }

    function playerJump(player) {
        if (!player.jumping && !player.dead && gameRunning && !gameOver) {
            player.vy = jumpForce;
            player.jumping = true;
            if (navigator.vibrate) navigator.vibrate(10);
        }
    }

    function update() {
        if (!gameRunning || gameOver) return;
        frameCount++;
        level = Math.floor((scoreP1 + scoreP2) / 200) + 1;
        baseGameSpeed = (hasBoost ? 7 : 4) + (level - 1) * 1.1;
        if (baseGameSpeed > 14) baseGameSpeed = 14;
        gameSpeed = frenzyMode ? baseGameSpeed * 0.5 : baseGameSpeed;
        levelLabel.textContent = '🌍 Ур. ' + level;

        // Frenzy timer
        if (frenzyMode) { frenzyTimer--; if (frenzyTimer <= 0) { frenzyMode = false;
                frenzyLabel.style.display = 'none'; } }

        // Комбо таймер
        if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) { comboCount = 0;
                comboLabel.style.display = 'none'; } }

        // Обновление игроков
        [player1, player2].forEach(p => {
            if (p.dead || (gameMode === 1 && p === player2)) return;
            p.vy += gravity;
            p.y += p.vy;
            if (p.y >= groundY - p.height) { p.y = groundY - p.height;
                p.vy = 0;
                p.jumping = false; }
        });

        // Движение пиццы
        let targetX = Math.min(player1.x, gameMode === 2 ? player2.x : player1.x) - pizzaDistance + (frenzyMode ? 80 : 0);
        if (gameMode === 2 && !player2.dead) targetX = Math.min(player1.x, player2.x) - pizzaDistance + (frenzyMode ? 80 : 0);
        pizza.x += (targetX - pizza.x) * 0.04;
        pizza.y = groundY - pizza.height + 15 + Math.sin(frameCount * 0.03) * 10;
        pizza.rotation += 0.025;

        // Препятствия
        for (let obs of obstacles) {
            obs.x -= gameSpeed;
            [player1, player2].forEach(p => {
                if (p.dead || (gameMode === 1 && p === player2)) return;
                if (checkCollision(p, obs)) {
                    if (frenzyMode && obs.type !== 'boss') {
                        spawnParticles(obs.x + obs.width / 2, obs.y + obs.height / 2, '#FFD700', 20);
                        obs.x = -200;
                        if (p === player1) scoreP1 += 20; else scoreP2 += 20;
                    } else if (p.shield) {
                        p.shield = false;
                        spawnParticles(p.x + p.width / 2, p.y + p.height / 2, '#FFF', 30);
                        obs.x = -200;
                    } else if (obs.type === 'boss') {
                        obs.hp--;
                        spawnParticles(obs.x + obs.width / 2, obs.y + obs.height / 2, '#FF0000', 15);
                        if (obs.hp <= 0) { obs.x = -300;
                            earnedCoins += 20; }
                    } else {
                        p.dead = true;
                        spawnParticles(p.x + p.width / 2, p.y + p.height / 2, '#FF0000', 40);
                        if (navigator.vibrate) navigator.vibrate(200);
                    }
                }
            });
        }
        obstacles = obstacles.filter(o => o.x > -200);

        // Монеты
        for (let coin of coins) {
            coin.x -= gameSpeed;
            [player1, player2].forEach(p => {
                if (p.dead || (gameMode === 1 && p === player2)) return;
                if (!coin.collected && checkCollision(p, coin)) {
                    coin.collected = true;
                    comboCount++; comboTimer = 90;
                    let pts = 10 * comboCount;
                    if (frenzyMode) pts *= 3;
                    if (p === player1) scoreP1 += pts; else scoreP2 += pts;
                    earnedCoins += Math.floor(pts / 5);
                    comboLabel.textContent = '🔥 x' + comboCount;
                    comboLabel.style.display = 'block';
                    spawnParticles(coin.x + coin.width / 2, coin.y + coin.height / 2, '#FFD700', 12);
                    if (navigator.vibrate) navigator.vibrate(5);
                    if (comboCount >= 5 && !frenzyMode) {
                        frenzyMode = true; frenzyTimer = 150;
                        spawnParticles(p.x + p.width / 2, p.y, '#FF00FF', 25);
                        frenzyLabel.style.display = 'block';
                    }
                }
            });
        }
        coins = coins.filter(c => c.x > -50 && !c.collected);

        // Частицы
        for (let p of particles) { p.x += p.vx;
            p.y += p.vy;
            p.life -= p.decay; }
        particles = particles.filter(p => p.life > 0);

        // UI
        scoreLabel.textContent = '🍕 P1: ' + scoreP1;
        if (gameMode === 2) p2ScoreLabel.textContent = '👤 P2: ' + scoreP2;
        coinLabel.textContent = '🪙 ' + (earnedCoins + totalCoins);

        // Конец игры
        if (player1.dead && (gameMode === 1 || player2.dead)) {
            endGame();
            return;
        }
        if (checkCollision(player1, pizza) && !frenzyMode && !player1.shield) { player1.dead = true;
            spawnParticles(player1.x + 22, player1.y + 25, '#FF0000', 30); }
        if (gameMode === 2 && checkCollision(player2, pizza) && !frenzyMode && !player2.shield) { player2.dead = true;
            spawnParticles(player2.x + 22, player2.y + 25, '#FF0000', 30); }
        if (player1.dead && (gameMode === 1 || player2.dead)) endGame();

        // Спавн
        let spawnObs = Math.max(25, 70 - level * 3);
        let spawnCoins = Math.max(12, 30 - level * 2);
        if (frameCount % spawnObs === 0) spawnObstacle();
        if (frameCount % spawnCoins === 0) spawnCoin();
        if (frameCount % 5 === 0) { scoreP1++;
            scoreLabel.textContent = '🍕 P1: ' + scoreP1; }
        if (gameMode === 2 && frameCount % 5 === 0) { scoreP2++;
            p2ScoreLabel.textContent = '👤 P2: ' + scoreP2; }

        // Screen shake
        if (screenShake > 0) screenShake *= 0.85;
        if (screenShake < 0.1) screenShake = 0;
    }

    function drawPlayer(p, isFrenzy) {
        if (p.dead || (gameMode === 1 && p === player2)) return;
        let x = p.x, y = p.y, w = p.width, h = p.height;
        let glow = isFrenzy ? 12 : 0;
        if (glow > 0) { ctx.fillStyle = 'rgba(255,0,255,0.5)';
            ctx.beginPath();
            ctx.arc(x + w / 2, y + h / 2, w, 0, Math.PI * 2);
            ctx.fill(); }
        if (p.shield) { ctx.strokeStyle = '#FFF';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(x + w / 2, y + h / 2, w * 0.8, 0, Math.PI * 2);
            ctx.stroke(); }
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(x + w / 2, y + h, w / 2, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        let legOff = Math.sin(frameCount * 0.3) * 5;
        ctx.fillStyle = '#1B2631';
        ctx.fillRect(x + 6, y + 34, 12, 16);
        ctx.fillRect(x + 27, y + 34 - legOff, 12, 16 + legOff);
        ctx.fillStyle = p.color;
        ctx.fillRect(x + 4, y + 12, 37, 26);
        ctx.fillStyle = '#FFCCBC';
        ctx.beginPath();
        ctx.arc(x + w / 2, y + 11, 14, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(x + 18, y + 9, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + 28, y + 9, 3, 0, Math.PI * 2);
        ctx.fill();
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);
        let shakeX = (Math.random() - 0.5) * screenShake;
        let shakeY = (Math.random() - 0.5) * screenShake;
        ctx.save();
        ctx.translate(shakeX, shakeY);
        let grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#87CEEB');
        grad.addColorStop(0.5, '#FFE4B5');
        grad.addColorStop(0.85, '#8B4513');
        grad.addColorStop(1, '#3E2723');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#4E342E';
        ctx.fillRect(0, groundY, W, H - groundY);
        ctx.fillStyle = '#5D4037';
        ctx.fillRect(0, groundY, W, 5);

        // Монеты
        for (let coin of coins) {
            if (coin.collected) continue;
            let cy = coin.y + Math.sin(frameCount * 0.07 + coin.bobOff) * 5;
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(coin.x + coin.width / 2, cy + coin.height / 2, coin.width / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🪙', coin.x + coin.width / 2, cy + coin.height / 2 + 4);
        }

        // Препятствия
        for (let obs of obstacles) {
            if (obs.type === 'box') { ctx.fillStyle = '#6D4C41';
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height); } else if (obs.type === 'sauce') { ctx.fillStyle = '#FF1744';
                ctx.beginPath();
                ctx.ellipse(obs.x + obs.width / 2, obs.y + obs.height / 2, obs.width / 2, obs.height / 2, 0, 0, Math.PI * 2);
                ctx.fill(); } else if (obs.type === 'flying') { ctx.fillStyle = '#B0BEC5';
                ctx.beginPath();
                ctx.ellipse(obs.x + obs.width / 2, obs.y + obs.height / 2, obs.width / 2, obs.height / 2, 0, 0, Math.PI * 2);
                ctx.fill(); } else if (obs.type === 'boss') { ctx.fillStyle = '#FF0000';
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.fillStyle = '#000';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('👾', obs.x + obs.width / 2, obs.y + obs.height / 2 + 6); }
        }

        drawPlayer(player1, frenzyMode);
        if (gameMode === 2) drawPlayer(player2, frenzyMode);

        // Пицца
        ctx.save();
        ctx.translate(pizza.x + pizza.width / 2, pizza.y + pizza.height / 2);
        ctx.rotate(pizza.rotation);
        ctx.fillStyle = '#F4A460';
        ctx.beginPath();
        ctx.arc(0, 0, 55, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FFD54F';
        ctx.beginPath();
        ctx.arc(0, 0, 48, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#E53935';
        ctx.beginPath();
        ctx.arc(0, 0, 40, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FFF';
        ctx.beginPath();
        ctx.arc(-15, -12, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(15, -12, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(-12, -10, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(18, -10, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        for (let p of particles) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
    }

    function endGame() {
        gameOver = true;
        gameRunning = false;
        totalCoins += earnedCoins;
        shopCoins += earnedCoins;
        localStorage.setItem('pizzaShopCoins', shopCoins);
        gameOverScreen.style.display = 'flex';
        finalScoreEl.textContent = 'P1: ' + scoreP1 + (gameMode === 2 ? ' | P2: ' + scoreP2 : '');
        coinsEarnedEl.textContent = '+🪙 ' + earnedCoins + ' (всего: ' + totalCoins + ')';
        winText.textContent = gameMode === 2 ? (scoreP1 > scoreP2 ? 'P1 ВЫИГРАЛ!' : scoreP2 > scoreP1 ? 'P2 ВЫИГРАЛ!' : 'НИЧЬЯ!') : 'ПИЦЦА ДОГНАЛА!';
    }

    function startGame(mode) {
        gameMode = mode;
        init();
        gameOver = false;
        gameRunning = true;
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        shopScreen.style.display = 'none';
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // Кнопки
    document.getElementById('btn1Player').addEventListener('click', () => startGame(1));
    document.getElementById('btn2Player').addEventListener('click', () => startGame(2));
    document.getElementById('btnRestart').addEventListener('click', () => startGame(gameMode));
    document.getElementById('btnToMenu').addEventListener('click', () => {
        gameRunning = false;
        gameOverScreen.style.display = 'none';
        startScreen.style.display = 'flex';
    });
    document.getElementById('btnShop').addEventListener('click', () => {
        startScreen.style.display = 'none';
        shopScreen.style.display = 'flex';
        updateShopDisplay();
    });
    document.getElementById('btnCloseShop').addEventListener('click', () => {
        shopScreen.style.display = 'none';
        startScreen.style.display = 'flex';
    });

    // Магазин
    document.getElementById('buyShield').addEventListener('click', () => {
        if (shopCoins >= 50 && !hasShield) { shopCoins -= 50;
            hasShield = true;
            localStorage.setItem('pizzaShopCoins', shopCoins);
            updateShopDisplay(); }
    });
    document.getElementById('buyBoost').addEventListener('click', () => {
        if (shopCoins >= 30 && !hasBoost) { shopCoins -= 30;
            hasBoost = true;
            localStorage.setItem('pizzaShopCoins', shopCoins);
            updateShopDisplay(); }
    });
    document.getElementById('buySkin').addEventListener('click', () => {
        if (shopCoins >= 100 && !skinUnlocked) { shopCoins -= 100;
            skinUnlocked = true;
            currentSkin = 'neon';
            localStorage.setItem('pizzaShopCoins', shopCoins);
            localStorage.setItem('pizzaSkin', 'neon');
            updateShopDisplay(); }
    });

    // Управление: левая половина = P1, правая = P2
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        for (let touch of e.changedTouches) {
            if (touch.clientX < window.innerWidth / 2) playerJump(player1);
            else if (gameMode === 2) playerJump(player2);
        }
    });
    canvas.addEventListener('click', (e) => {
        if (e.clientX < window.innerWidth / 2) playerJump(player1);
        else if (gameMode === 2) playerJump(player2);
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'a') playerJump(player1);
        if (e.key === 'ArrowRight' || e.key === 'd') playerJump(player2);
    });

    init();
    gameLoop();
</script>
</body>
  </html>
